# ─── Quarkus Application Config ────────────────────────────────────────────────
quarkus.application.name=bitrix24-stand
quarkus.application.version=1.0.0-SNAPSHOT

# HTTP
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=Bitrix24 Debug Stand API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=\
  Phase 2 microservice — visual screens for Bitrix24 boilerplate bundle vitrine,\
  status monitoring, and business process chain management.

# Bitrix24 Python boilerplate REST bridge base URL
# In production, this points to the Python boilerplate service
bitrix24.bridge.url=http://localhost:5000
bitrix24.bridge.timeout=30s

# Health check
quarkus.smallrye-health.root-path=/health

# Logging
quarkus.log.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
